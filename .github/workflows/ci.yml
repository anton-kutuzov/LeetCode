name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: pip install -e '.[dev]'

      - name: Lint with ruff
        run: ruff check .

      - name: Run pytest
        run: pytest --cov --cov-report=term-missing

  readme-up-to-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate README and check no diff
        run: |
          python scripts/generate_readme.py
          git diff --exit-code -- README.md src/main/python/**/README.md \
            || (echo "::error::README.md is out of date — run 'python scripts/generate_readme.py' and commit the result." && exit 1)
